[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; connect-src 'self' https: http://localhost:5001 http://localhost:8000 http://localhost:3000 http://127.0.0.1:5001 http://127.0.0.1:8000;"
