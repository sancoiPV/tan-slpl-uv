# NOTA: El frontend ha sigut migrat a GitHub Pages (carpeta docs/, branch main).
# URL pública nova: https://sancoipv.github.io/tan-slpl-uv/
# Aquest fitxer es manté per compatibilitat però Netlify ja no és el desplegament actiu.

[build]
  publish = "frontend"
  command = ""
[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    # CSP explícita per sobreescriure la política automàtica de Netlify.
    # connect-src permet connexions a localhost (motors locals CT2 i uvicorn)
    # a més de https: (ngrok, Netlify, serveis externs).
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; connect-src 'self' https: http://localhost:5001 http://localhost:8000 http://localhost:3000 http://127.0.0.1:5001 http://127.0.0.1:8000;"
